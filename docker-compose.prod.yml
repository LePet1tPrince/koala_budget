version: '3.8'

# Production environment
# Uses shared PostgreSQL and Redis from docker-compose.shared.yml

services:
  web:
    container_name: koala-web-prod
    build:
      context: .
      dockerfile: Dockerfile.web
    command: /start
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=koala_budget.settings_production
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_PROD:-koala_budget_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/0
      - SECRET_KEY=${SECRET_KEY_PROD}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-True}
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:8000/health/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prod-network
      - shared-network

  celery:
    container_name: koala-celery-prod
    build:
      context: .
      dockerfile: Dockerfile.web
    command: celery -A koala_budget worker -l INFO --pool threads --concurrency 20
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=koala_budget.settings_production
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_PROD:-koala_budget_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/0
      - SECRET_KEY=${SECRET_KEY_PROD}
    restart: unless-stopped
    networks:
      - prod-network
      - shared-network

  celery-beat:
    container_name: koala-celery-beat-prod
    build:
      context: .
      dockerfile: Dockerfile.web
    command: celery -A koala_budget beat -l INFO
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=koala_budget.settings_production
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_PROD:-koala_budget_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/0
      - SECRET_KEY=${SECRET_KEY_PROD}
    restart: unless-stopped
    networks:
      - prod-network
      - shared-network

  nginx:
    container_name: koala-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./static_root:/static:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - prod-network
      - dev-network

  certbot:
    container_name: koala-certbot
    image: certbot/certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

networks:
  prod-network:
    name: koala-prod-network
    driver: bridge
  dev-network:
    name: koala-dev-network
    driver: bridge
  shared-network:
    name: koala-shared-network
    external: true

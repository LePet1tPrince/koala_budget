services:
  db:
    image: postgres:17
    # persist data beyond lifetime of container
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=koala_budget
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      interval: 2s
      retries: 10
  redis:
    image: redis
    # persistent storage
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: bash -c 'exec 6<>/dev/tcp/redis/6379'
      interval: 2s
      retries: 10
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        MY_UID: ${MY_UID:-1000}
        MY_GID: ${MY_GID:-1000}
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
    env_file:
      - path: ./.env
        required: false
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  vite:
    build:
      context: .
      dockerfile: Dockerfile.vite
      args:
        MY_UID: ${MY_UID:-1000}
        MY_GID: ${MY_GID:-1000}
    command: npm run dev -- --host
    volumes:
      - .:/code
      - vite_node_modules:/code/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped
  celery:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        MY_UID: ${MY_UID:-1000}
        MY_GID: ${MY_GID:-1000}
    command: celery -A koala_budget worker -l INFO --beat --pool=solo -E
    volumes:
      - .:/code
    environment:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
    env_file:
      - path: ./.env
        required: false
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  # frontend:
  #   build:
  #     context: .
  #     dockerfile: ./frontend/Dockerfile
  #     args:
  #       MY_UID: ${MY_UID:-1000}
  #       MY_GID: ${MY_GID:-1000}
  #   command: npm run dev-host
  #   volumes:
  #     - .:/code
  #     - /code/frontend/node_modules
  #   ports:
  #     - 5174:5174

  flower:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: celery -A koala_budget flower --broker=redis://redis:6379
    volumes:
      - .:/code
    environment:
      PYTHONUNBUFFERED: '1'
      PYTHONDONTWRITEBYTECODE: '1'
      DJANGO_SETTINGS_MODULE: 'koala_budget.settings'
    env_file:
      - path: ./.env
        required: false
    ports:
      - 5555:5555
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      celery:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  vite_node_modules:

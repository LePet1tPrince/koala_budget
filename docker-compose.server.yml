version: '3.8'

# Server deployment configuration for both dev and prod environments
# Uses profiles to manage which services to start
#
# Usage:
#   docker-compose -f docker-compose.server.yml --profile shared up -d  # Start shared services
#   docker-compose -f docker-compose.server.yml --profile prod up -d    # Start production
#   docker-compose -f docker-compose.server.yml --profile dev up -d     # Start development
#   docker-compose -f docker-compose.server.yml --profile shared --profile prod up -d  # Start both

services:
  # ============================================================================
  # Shared Services (used by both prod and dev)
  # ============================================================================

  postgres:
    profiles: ["shared"]
    image: postgres:17
    container_name: koala-postgres-shared
    volumes:
      - postgres_shared_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: pg_isready -U $${POSTGRES_USER}
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  redis:
    profiles: ["shared"]
    image: redis:7-alpine
    container_name: koala-redis-shared
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_shared_data:/data
    ports:
      - "6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    restart: unless-stopped
    healthcheck:
      test: redis-cli --no-auth-warning -a $${REDIS_PASSWORD} ping | grep PONG
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shared-network

  # ============================================================================
  # Production Services
  # ============================================================================

  web-prod:
    profiles: ["prod"]
    container_name: koala-web-prod
    build:
      context: .
      dockerfile: Dockerfile.web
    command: /start
    volumes:
      - static_files:/code/static_root
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=koala_budget.settings_production
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_PROD:-koala_budget_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/0
      - SECRET_KEY=${SECRET_KEY_PROD}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DJANGO_SECURE_SSL_REDIRECT=${DJANGO_SECURE_SSL_REDIRECT:-True}
      - DJANGO_CSRF_COOKIE_SECURE=${DJANGO_CSRF_COOKIE_SECURE:-True}
      - DJANGO_SESSION_COOKIE_SECURE=${DJANGO_SESSION_COOKIE_SECURE:-True}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost}
      - PORT=8000
      - TURNSTILE_KEY=${TURNSTILE_KEY}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET}
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:8000/health/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - prod-network
      - shared-network

  celery-prod:
    profiles: ["prod"]
    container_name: koala-celery-prod
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A koala_budget worker -l INFO --pool threads --concurrency 20
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=koala_budget.settings_production
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_PROD:-koala_budget_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/0
      - SECRET_KEY=${SECRET_KEY_PROD}
      - TURNSTILE_KEY=${TURNSTILE_KEY}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET}
    restart: unless-stopped
    networks:
      - prod-network
      - shared-network

  celery-beat-prod:
    profiles: ["prod"]
    container_name: koala-celery-beat-prod
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A koala_budget beat -l INFO
    environment:
      - DEBUG=0
      - DJANGO_SETTINGS_MODULE=koala_budget.settings_production
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_PROD:-koala_budget_prod}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/0
      - SECRET_KEY=${SECRET_KEY_PROD}
      - TURNSTILE_KEY=${TURNSTILE_KEY}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET}
    restart: unless-stopped
    networks:
      - prod-network
      - shared-network

  # ============================================================================
  # Development Services
  # ============================================================================

  web-dev:
    profiles: ["dev"]
    container_name: koala-web-dev
    build:
      context: .
      dockerfile: Dockerfile.web
    command: /start
    volumes:
      - static_files:/code/static_root
    environment:
      - DEBUG=1
      - DJANGO_VITE_DEV_MODE=False
      - DJANGO_SETTINGS_MODULE=koala_budget.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_DEV:-koala_budget_dev}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/1
      - SECRET_KEY=${SECRET_KEY_DEV}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS_DEV:-localhost,127.0.0.1,dev.koalabudget.com}
      - DJANGO_SECURE_SSL_REDIRECT=False
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS_DEV:-http://localhost}
      - PORT=8001
      - TURNSTILE_KEY=${TURNSTILE_KEY}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET}
    restart: unless-stopped
    healthcheck:
      test: curl --fail http://localhost:8001/health/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - dev-network
      - shared-network

  celery-dev:
    profiles: ["dev"]
    container_name: koala-celery-dev
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A koala_budget worker -l DEBUG --pool threads --concurrency 10
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=koala_budget.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_DEV:-koala_budget_dev}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/1
      - SECRET_KEY=${SECRET_KEY_DEV}
      - TURNSTILE_KEY=${TURNSTILE_KEY}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET}
    restart: unless-stopped
    networks:
      - dev-network
      - shared-network

  celery-beat-dev:
    profiles: ["dev"]
    container_name: koala-celery-beat-dev
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: celery -A koala_budget beat -l DEBUG
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=koala_budget.settings
      - DATABASE_URL=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@koala-postgres-shared:5432/${POSTGRES_DB_DEV:-koala_budget_dev}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@koala-redis-shared:6379/1
      - SECRET_KEY=${SECRET_KEY_DEV}
      - TURNSTILE_KEY=${TURNSTILE_KEY}
      - TURNSTILE_SECRET=${TURNSTILE_SECRET}
    restart: unless-stopped
    networks:
      - dev-network
      - shared-network

  # ============================================================================
  # Nginx & SSL (single shared instance routing both prod and dev by domain)
  # ============================================================================

  nginx:
    profiles: ["shared"]
    container_name: koala-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/prod.conf:/etc/nginx/conf.d/prod.conf:ro
      - ./deploy/nginx/conf.d/dev.conf:/etc/nginx/conf.d/dev.conf:ro
      - static_files:/static:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    restart: unless-stopped
    networks:
      - prod-network
      - dev-network

  certbot:
    profiles: ["shared"]
    container_name: koala-certbot
    image: certbot/certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    restart: unless-stopped

volumes:
  postgres_shared_data:
  redis_shared_data:
  static_files:

networks:
  prod-network:
    name: koala-prod-network
    driver: bridge
  dev-network:
    name: koala-dev-network
    driver: bridge
  shared-network:
    name: koala-shared-network
    driver: bridge

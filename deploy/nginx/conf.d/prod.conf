# Production environment configuration

# HTTP: Let's Encrypt verification + redirect to HTTPS
server {
    listen 80;
    server_name koalabudget.com www.koalabudget.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: SSL termination + proxy to Django
server {
    listen 443 ssl;
    http2 on;
    server_name koalabudget.com www.koalabudget.com;

    ssl_certificate /etc/letsencrypt/live/koalabudget.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/koalabudget.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        resolver 127.0.0.11 valid=30s;
        set $upstream http://koala-web-prod:8000;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

{% load i18n %}

<!-- Net Worth Card -->
<div class="bg-base-100 rounded-lg shadow mb-6 p-6">
  <div class="flex items-center gap-8">
    <!-- Left: Net Worth -->
    <div class="pr-8 border-r border-base-300">
      <div class="text-sm text-base-content/60 mb-1">{% translate "Net Worth" %}</div>
      <div class="text-3xl font-bold text-primary">${{ net_worth_card.net_worth|floatformat:2 }}</div>
    </div>

    <!-- Right: Breakdown rows -->
    <div class="w-64 flex flex-col gap-1.5 ml-auto">
      <div class="flex justify-between items-center">
        <div class="flex items-center gap-2 text-sm text-base-content/70">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 00.75-.75 2.25 2.25 0 00-.1-.664m-5.8 0A2.251 2.251 0 0113.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25z" />
          </svg>
          {% translate "Budgeted" %}
        </div>
        <span class="font-mono font-semibold text-sm">${{ net_worth_card.spend|floatformat:2 }}</span>
      </div>

      <div class="flex justify-between items-center">
        <div class="flex items-center gap-2 text-sm text-base-content/70">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12c0 1.268-.63 2.39-1.593 3.068a3.745 3.745 0 01-1.043 3.296 3.745 3.745 0 01-3.296 1.043A3.745 3.745 0 0112 21c-1.268 0-2.39-.63-3.068-1.593a3.746 3.746 0 01-3.296-1.043 3.745 3.745 0 01-1.043-3.296A3.745 3.745 0 013 12c0-1.268.63-2.39 1.593-3.068a3.745 3.745 0 011.043-3.296 3.746 3.746 0 013.296-1.043A3.746 3.746 0 0112 3c1.268 0 2.39.63 3.068 1.593a3.746 3.746 0 013.296 1.043 3.746 3.746 0 011.043 3.296A3.745 3.745 0 0121 12z" />
          </svg>
          {% translate "Goals" %}
        </div>
        <span class="font-mono font-semibold text-sm">${{ net_worth_card.save|floatformat:2 }}</span>
      </div>

      <div class="divider my-0"></div>

      <div class="flex justify-between items-center">
        <div class="flex items-center gap-2 text-sm font-semibold text-base-content">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 13.5L12 21m0 0l-7.5-7.5M12 21V3" />
          </svg>
          {% translate "Available" %}
        </div>
        <span class="font-mono font-bold text-sm {% if net_worth_card.available < 0 %}text-error{% elif net_worth_card.available > 0 %}text-success{% endif %}">${{ net_worth_card.available|floatformat:2 }}</span>
      </div>
    </div>
  </div>
</div>

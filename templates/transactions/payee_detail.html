{% extends "web/app/app_base.html" %}
{% load i18n %}
{% block app %}
<nav aria-label="breadcrumbs">
  <ol class="pg-breadcrumbs">
    <li><a href="{% url 'transactions:payee_list' request.team.slug %}">{% translate "Payees" %}</a></li>
    <li class="pg-breadcrumb-active" aria-current="page">{{ payee.name }}</li>
  </ol>
</nav>
<section class="app-card">
  <div class="flex justify-between items-center mb-4">
    <h3 class="pg-subtitle">{{ payee.name }}</h3>
    <div class="flex gap-2">
      <a href="{% url 'transactions:payee_update' request.team.slug payee.pk %}" class="pg-button-primary">
        {% translate "Edit" %}
      </a>
      <a href="{% url 'transactions:payee_delete' request.team.slug payee.pk %}" class="pg-button-danger">
        {% translate "Delete" %}
      </a>
    </div>
  </div>
  <dl class="grid grid-cols-1 gap-4">
    <div>
      <dt class="font-semibold">{% translate "Name" %}</dt>
      <dd>{{ payee.name }}</dd>
    </div>
    <div>
      <dt class="font-semibold">{% translate "Created" %}</dt>
      <dd>{{ payee.created_at }}</dd>
    </div>
  </dl>
</section>
{% endblock %}
